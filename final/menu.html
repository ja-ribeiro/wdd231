<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="images/favicon.ico">

</head>
<body>

<header class="header">
  <h1>Menu</h1>
  <button id="menu-btn">☰</button>
  <nav id="nav">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="details.html">Details</a>
  </nav>
</header>

<main>

<section class="menu-section">

  <div class="tabs">
    <button data-filter="all">All</button>
    <button data-filter="drink">Drinks</button>
    <button data-filter="food">Food</button>
  </div>

  <div class="menu-grid">

    <div class="card drink">
      <h3>Espresso</h3>
      <p>$3</p>
    </div>

    <div class="card drink">
      <h3>Latte</h3>
      <p>$5</p>
    </div>

    <div class="card drink">
      <h3>Cappuccino</h3>
      <p>$5</p>
    </div>

    <div class="card food">
      <h3>Croissant</h3>
      <p>$4</p>
    </div>

    <div class="card food">
      <h3>Sandwich</h3>
      <p>$6</p>
    </div>

  </div>

</section>

</main>

<footer class="footer">

  <div class="footer-container">

    <!-- LOGO / NOME -->
    <div class="footer-brand">
      <h2>CoffeeSpot</h2>
      <p>Brewing happiness, one cup at a time ☕</p>
    </div>

    <!-- CONTATO -->
    <div class="footer-contact">
      <h3>Contact</h3>
      <p>📍 123 Coffee Street</p>
      <p>📞 (11) 99999-9999</p>
      <p>✉️ contact@coffeespot.com</p>
    </div>

    <!-- REDES SOCIAIS -->
    <div class="footer-social">
      <h3>Follow Us</h3>
      <a href="#" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="#" aria-label="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 CoffeeSpot. All rights reserved.</p>
  </div>

</footer>

<script src="script.js"></script>
</body>
</html>
